# -------------------------------
# MySQL (ACTIVO)
# -------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/clinica4_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=servicio
spring.datasource.password=servicio
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

